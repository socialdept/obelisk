services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reservoir
      POSTGRES_USER: reservoir
      POSTGRES_PASSWORD: reservoir
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservoir"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata: {}
